# 生产环境配置 — 通过环境变量注入敏感信息
# 激活方式：spring.profiles.active=prod 或 SPRING_PROFILES_ACTIVE=prod

server:
  port: 18080
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 10000
      pool-name: smartrecord-hikari
  data:
    redis:
      host: ${SPRING_REDIS_HOST}
      port: ${SPRING_REDIS_PORT}
      password: ${SPRING_REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 5000ms
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
  cloud:
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:}
      eager: true

# Actuator + OpenTelemetry
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# 关闭生产环境 Swagger
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 关闭 MyBatis SQL 日志（生产噪音太大）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nop.NopLoggingImpl

app:
  jwt:
    secret: ${JWT_SECRET}
  oss:
    endpoint: ${OSS_ENDPOINT}
    access-key-id: ${OSS_ACCESS_KEY_ID}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}
    bucket-name: ${OSS_BUCKET_NAME}
  snowflake:
    data-center-id: ${SNOWFLAKE_DATA_CENTER_ID:1}
    worker-id: ${SNOWFLAKE_WORKER_ID:1}

wechat:
  appid: ${WECHAT_APPID}
  secret: ${WECHAT_SECRET}

tts:
  edge-tts-cmd: edge-tts

storage:
  provider: ${STORAGE_PROVIDER:aliyun}
  cloudbase:
    env-id: ${CLOUDBASE_ENV_ID:}
  cos:
    bucket: ${COS_BUCKET:}
    region: ${COS_REGION:}
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}

logging:
  file:
    name: ${LOG_FILE:/opt/smartrecord/logs/app.log}
  level:
    root: INFO
    com.smartrecord: INFO
