# 本地开发配置 — 密钥通过环境变量注入，参考 .env.example
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:13306/smartrecord?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:16379}

app:
  jwt:
    secret: ${JWT_SECRET:}
  oss:
    endpoint: ${OSS_ENDPOINT:}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${OSS_BUCKET_NAME:}
  llm:
    api-url: ${LLM_API_URL:}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:}
  tts:
    mimo-voice: ${TTS_MIMO_VOICE:冰糖}

wechat:
  appid: ${WECHAT_APPID:}
  secret: ${WECHAT_SECRET:}

tts:
  edge-tts-cmd: ${TTS_EDGE_TTS_CMD:edge-tts}
