server:
  port: 18080
  servlet:
    context-path: /api

spring:
  application:
    name: smartrecord
  profiles:
    active: local
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:13306/smartrecord?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:16379}
      database: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# 自定义配置
app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-here-change-in-production}
    expiration: 604800000  # 7 天
  oss:
    endpoint: ${OSS_ENDPOINT:oss-cn-guangzhou.aliyuncs.com}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${OSS_BUCKET_NAME:smartrecord}
  room:
    no-charset: "ABCDEFGHJKMNPQRSTUVWXYZ23456789"
    no-length: 6
    expire-hours: 24
  llm:
    api-url: ${LLM_API_URL:}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:deepseek-chat}

wechat:
  appid: ${WECHAT_APPID:}
  secret: ${WECHAT_SECRET:}

tts:
  edge-tts-cmd: ${TTS_EDGE_TTS_CMD:edge-tts}
  voice: zh-CN-XiaoxiaoNeural

emotion:
  audio:
    win-urls:
      - https://smartrecord.oss-cn-guangzhou.aliyuncs.com/emotion/win_01.mp3
      - https://smartrecord.oss-cn-guangzhou.aliyuncs.com/emotion/win_02.mp3
      - https://smartrecord.oss-cn-guangzhou.aliyuncs.com/emotion/win_03.mp3
    lose-urls:
      - https://smartrecord.oss-cn-guangzhou.aliyuncs.com/emotion/lose_01.mp3
      - https://smartrecord.oss-cn-guangzhou.aliyuncs.com/emotion/lose_02.mp3
      - https://smartrecord.oss-cn-guangzhou.aliyuncs.com/emotion/lose_03.mp3
