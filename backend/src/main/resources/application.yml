# 共享配置 — 不含敏感信息，各 profile 覆盖数据库/Redis/密钥等
server:
  port: 18080
  servlet:
    context-path: /api

spring:
  application:
    name: smartrecord
  profiles:
    active: local
  threads:
    virtual:
      enabled: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  room:
    no-charset: "ABCDEFGHJKMNPQRSTUVWXYZ23456789"
    no-length: 6
    expire-hours: 24

tts:
  voice: zh-CN-XiaoxiaoNeural

emotion:
  audio:
    win-urls:
      - https://smartrecord.oss-cn-guangzhou.aliyuncs.com/emotion/win_01.mp3
      - https://smartrecord.oss-cn-guangzhou.aliyuncs.com/emotion/win_02.mp3
      - https://smartrecord.oss-cn-guangzhou.aliyuncs.com/emotion/win_03.mp3
    lose-urls:
      - https://smartrecord.oss-cn-guangzhou.aliyuncs.com/emotion/lose_01.mp3
      - https://smartrecord.oss-cn-guangzhou.aliyuncs.com/emotion/lose_02.mp3
      - https://smartrecord.oss-cn-guangzhou.aliyuncs.com/emotion/lose_03.mp3
    neutral-urls: []

jetcache:
  statIntervalMinutes: 15          # 每 15 分钟输出一次缓存命中率统计
  areaInCacheName: false
  local:
    default:
      type: caffeine               # L1 本地缓存引擎
      limit: 1000                  # 本地最大缓存条目数
      keyConvertor: fastjson       # key 序列化方式
      expireAfterWriteInMillis: 600000  # 本地缓存 10 分钟过期
  remote:
    default:
      type: redis.lettuce           # L2 远程缓存引擎
      keyConvertor: fastjson
      valueEncoder: java            # 远程 value 序列化方式 (JDK)
      valueDecoder: java
      expireAfterWriteInMillis: 3600000  # 远程缓存 1 小时过期
