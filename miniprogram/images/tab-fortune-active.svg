<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="#0A84FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- 航行核心 / 点火环 / 同心圆 + 刻度 -->
  <circle cx="24" cy="24" r="18"/>
  <circle cx="24" cy="24" r="10" stroke-width="1.5"/>
  <circle cx="24" cy="24" r="3" fill="#0A84FF" stroke="none"/>
  <!-- 刻度线 -->
  <line x1="24" y1="4" x2="24" y2="8" stroke-width="1.5"/>
  <line x1="24" y1="40" x2="24" y2="44" stroke-width="1.5"/>
  <line x1="4" y1="24" x2="8" y2="24" stroke-width="1.5"/>
  <line x1="40" y1="24" x2="44" y2="24" stroke-width="1.5"/>
  <!-- 对角刻度 -->
  <line x1="10.1" y1="10.1" x2="12.9" y2="12.9" stroke-width="1.5"/>
  <line x1="35.1" y1="35.1" x2="37.9" y2="37.9" stroke-width="1.5"/>
  <line x1="37.9" y1="10.1" x2="35.1" y2="12.9" stroke-width="1.5"/>
