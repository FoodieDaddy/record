services:
  mysql:
    image: mysql:8.0
    container_name: sr-mysql
    restart: unless-stopped
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: smartrecord
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --slow-query-log=1
      - --slow-query-log-file=/var/lib/mysql/slow.log
      - --long-query-time=1

  redis:
    image: redis:7-alpine
    container_name: sr-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec

  sentinel:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: sr-sentinel
    restart: unless-stopped
    ports:
      - "18858:8858"
    environment:
      JAVA_OPT: "-Xms128m -Xmx256m"

volumes:
  mysql_data:
  redis_data:
